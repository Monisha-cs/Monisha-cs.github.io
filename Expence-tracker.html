<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expence Tracker</title>
    <link rel="stylesheet" href="./Expence-tracker.css">
</head>
<body>
    <div class="container">
        <h1>💰 Expence Tracker</h1>
        <div class="balance">
            Balance :₹<span id="balance">0</span>
        </div>

        <div class="money">
            <div>
                <p>Income</p>
                <p class="income">₹<span id="income">0</span></p>
            </div>
            <div>
                <p>Expense</p>
                <p class="expense">₹<span id="expense">0</span></p>
            </div>
        </div>
        <div class="form">
            <input id="text" type="text" placeholder="Enter description(e.x:Salary)">
            <input id="amount" type="number" placeholder="Amount(+income/-expense)">
        </div>
        <div>
            <button onclick="addTransaction()">Add Transaction</button>
        </div>
        <ul id="list"></ul>
    </div>
    <script src="./Expence-tracker.js"></script>
</body>
</html>
